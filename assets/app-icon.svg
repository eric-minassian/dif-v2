<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="shape">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- Warm cream gradient for top-left half -->
    <linearGradient id="lightHalf" x1="0" y1="0" x2="0.55" y2="0.55">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#ebe3d4"/>
    </linearGradient>

    <!-- Deep indigo gradient for bottom-right half -->
    <linearGradient id="darkHalf" x1="0.45" y1="0.45" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>

    <!-- Soft glow along the gap -->
    <filter id="gapGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <g clip-path="url(#shape)">
    <!-- Base fill (visible in gap) -->
    <rect width="1024" height="1024" fill="#0c0d1a"/>

    <!-- Subtle luminous glow along the diagonal gap -->
    <line x1="-30" y1="1054" x2="1054" y2="-30"
          stroke="#6366f1" stroke-width="4" opacity="0.3" filter="url(#gapGlow)"/>

    <!-- Top-left half — warm cream -->
    <polygon points="-2,-2 1017,-2 -2,1017" fill="url(#lightHalf)"/>

    <!-- Bottom-right half — deep indigo -->
    <polygon points="1026,7 1026,1026 7,1026" fill="url(#darkHalf)"/>
  </g>
</svg>
